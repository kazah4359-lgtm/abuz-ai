name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh content from Telegram + YouTube once a day (03:17 UTC).
    # The site picks up new TG posts and YouTube videos within ~24h
    # of publication. Manual rebuilds are still available via
    # workflow_dispatch ("Run workflow" button).
    - cron: '17 3 * * *'

# Required for GitHub Pages deploy via official action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Fetch Telegram + YouTube content
        run: npm run fetch

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
